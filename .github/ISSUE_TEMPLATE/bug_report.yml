name: "Bug Report"
description: Report errors or unexpected behavior.
labels:
  - bug
body:
  - type: checkboxes
    attributes:
      label: Self Checks
      options:
        - label: I have searched for existing issues, including closed ones.
          required: true

  - type: input
    attributes:
      label: Version
      description: See the Settings page in the app.
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Operating System
      multiple: false
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: Describe the steps to reproduce the bug. Screenshots and logs are helpful.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional Context
      description: Any other information, screenshots, or logs.
    validations:
      required: false